<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">Current Colony capabilities</title>
  <desc id="desc">A product capability map showing install, observe, coordinate, plan, recover, and inspect surfaces available in Colony today.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07110f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#64748b"/>
    </marker>
    <style>
      text{fill:#e5e7eb;font-family:Arial,sans-serif;letter-spacing:0}
      .panel{fill:#0b0f14;stroke:#253040;stroke-width:1.2}
      .core{fill:#052e2b;stroke:#34d399;stroke-width:1.8}
      .blue{fill:#0f1d36;stroke:#60a5fa;stroke-width:1.3}
      .amber{fill:#2a1f05;stroke:#f59e0b;stroke-width:1.3}
      .violet{fill:#211538;stroke:#a78bfa;stroke-width:1.3}
      .rose{fill:#2b1118;stroke:#fb7185;stroke-width:1.3}
      .line{stroke:#64748b;stroke-width:1.4;fill:none;marker-end:url(#arrow)}
      .soft{stroke:#334155;stroke-width:1;fill:none}
      .muted{fill:#94a3b8}
      .mono{font-family:monospace;letter-spacing:0}
      .tiny{font-size:12px}
      .small{font-size:14px}
    </style>
  </defs>
  <rect width="900" height="430" rx="22" fill="url(#bg)"/>
  <rect x="1" y="1" width="898" height="428" rx="21" fill="none" stroke="#1f2937"/>
  <text x="34" y="44" font-size="25" font-weight="720">What Colony can do right now</text>
  <text x="34" y="68" font-size="14" class="muted">The current product is local memory plus coordination, not a remote agent commander.</text>

  <g transform="translate(362 139)">
    <rect class="core" width="176" height="118" rx="20"/>
    <text x="43" y="44" font-size="26" font-weight="760">Colony</text>
    <text x="32" y="72" font-size="12" class="muted mono tiny">local coordination</text>
    <text x="44" y="94" font-size="12" class="muted mono tiny">~/.colony + MCP</text>
    <circle cx="142" cy="37" r="7" fill="#bbf7d0"/>
  </g>

  <g transform="translate(34 108)">
    <rect class="blue" width="214" height="76" rx="14"/>
    <text x="18" y="29" font-size="14" font-weight="700">Install</text>
    <text x="18" y="52" font-size="12" class="muted mono tiny">hooks + stdio MCP config</text>
    <path class="line" d="M214 38H317"/>
  </g>

  <g transform="translate(34 217)">
    <rect class="panel" width="214" height="76" rx="14"/>
    <text x="18" y="29" font-size="14" font-weight="700">Observe</text>
    <text x="18" y="52" font-size="12" class="muted mono tiny">sessions, prompts, tools</text>
    <path class="line" d="M214 38H317"/>
  </g>

  <g transform="translate(34 326)">
    <rect class="violet" width="214" height="66" rx="14"/>
    <text x="18" y="27" font-size="14" font-weight="700">Search memory</text>
    <text x="18" y="49" font-size="12" class="muted mono tiny">search -> hydrate selected IDs</text>
    <path class="line" d="M214 4C296 -4 332 -68 328 -112"/>
  </g>

  <g transform="translate(652 108)">
    <rect class="amber" width="214" height="76" rx="14"/>
    <text x="18" y="29" font-size="14" font-weight="700">Plan</text>
    <text x="18" y="52" font-size="12" class="muted mono tiny">Queen waves + task_plan_*</text>
    <path class="line" d="M0 38H-106"/>
  </g>

  <g transform="translate(652 217)">
    <rect class="panel" width="214" height="76" rx="14"/>
    <text x="18" y="29" font-size="14" font-weight="700">Coordinate</text>
    <text x="18" y="52" font-size="12" class="muted mono tiny">claims, messages, handoffs</text>
    <path class="line" d="M0 38H-106"/>
  </g>

  <g transform="translate(652 326)">
    <rect class="rose" width="214" height="66" rx="14"/>
    <text x="18" y="27" font-size="14" font-weight="700">Recover</text>
    <text x="18" y="49" font-size="12" class="muted mono tiny">health, sweep, stale cleanup</text>
    <path class="line" d="M0 4C-84 -4 -118 -68 -114 -112"/>
  </g>

  <g transform="translate(332 314)">
    <rect class="panel" width="236" height="78" rx="14"/>
    <text x="19" y="29" font-size="14" font-weight="700">Inspect</text>
    <text x="19" y="52" font-size="12" class="muted mono tiny">viewer graph + colony health</text>
    <path class="soft" d="M118 0V-50"/>
  </g>

  <g transform="translate(304 89)">
    <rect x="0" y="0" width="292" height="30" rx="15" fill="#111827" stroke="#253040"/>
    <text x="17" y="20" font-size="12" class="muted mono tiny">claim before edit - compact first - stale signals evaporate</text>
  </g>
</svg>
